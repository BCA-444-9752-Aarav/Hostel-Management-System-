<svg width="80" height="80" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="avatarGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A73E8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF6EC7;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="40" cy="40" r="38" fill="url(#avatarGradient)" opacity="0.1"/>
  <circle cx="40" cy="40" r="35" fill="none" stroke="url(#avatarGradient)" stroke-width="2"/>
  
  <!-- Person Icon -->
  <g transform="translate(40, 40)">
    <!-- Head -->
    <circle cx="0" cy="-10" r="8" fill="url(#avatarGradient)"/>
    
    <!-- Body -->
    <path d="M -12 5 Q -12 -2, -8 -2 L 8 -2 Q 12 -2, 12 5 L 12 15 L -12 15 Z" fill="url(#avatarGradient)"/>
    
    <!-- Face Details -->
    <circle cx="-3" cy="-12" r="1.5" fill="white"/>
    <circle cx="3" cy="-12" r="1.5" fill="white"/>
    <path d="M -4 -8 Q 0 -6, 4 -8" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  </g>
</svg>
