<svg width="80" height="80" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A73E8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FF6EC7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00BFA6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="40" cy="40" r="38" fill="url(#logoGradient)" opacity="0.1"/>
  <circle cx="40" cy="40" r="35" fill="none" stroke="url(#logoGradient)" stroke-width="2"/>
  
  <!-- Building Icon -->
  <g transform="translate(25, 20)">
    <!-- Main Building -->
    <rect x="5" y="15" width="20" height="25" fill="url(#logoGradient)" rx="2"/>
    
    <!-- Roof -->
    <polygon points="0,15 15,5 30,15" fill="#1A73E8"/>
    
    <!-- Windows -->
    <rect x="8" y="18" width="4" height="4" fill="white" opacity="0.8"/>
    <rect x="18" y="18" width="4" height="4" fill="white" opacity="0.8"/>
    <rect x="8" y="25" width="4" height="4" fill="white" opacity="0.8"/>
    <rect x="18" y="25" width="4" height="4" fill="white" opacity="0.8"/>
    
    <!-- Door -->
    <rect x="12" y="32" width="6" height="8" fill="white" opacity="0.9"/>
    
    <!-- Text -->
    <text x="15" y="50" font-family="Arial, sans-serif" font-size="8" font-weight="bold" text-anchor="middle" fill="url(#logoGradient)">ABH</text>
  </g>
</svg>
